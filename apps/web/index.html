<!doctype html>
<html lang="en">
  <head>
    <!--
      RESPONSIBILITY ENVELOPE
      File role: Vite document entry.
      Owns: document shell, head metadata, favicon, viewport, root mount node.
      Must not own: app logic, route UI, design-system rules, feature scripts.
      Safe edits: title, meta tags, static document-level assets.
      Unsafe edits: React startup logic, providers, route markup.
      Architecture rule: keep this as the browser document boundary only.
      Related files: src/main.tsx, src/App.tsx.
    -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Default until React syncs from resolved theme (see ThemeColorMeta on each route branch). -->
    <meta name="theme-color" content="#0a0a0a" />
    <title>Afenda</title>
    <!--
      Sync theme class before paint. Key must match the active route:
      - `/app/*` → vite-ui-theme (AppThemeProvider)
      - public marketing → vite-ui-marketing-theme (MarketingThemeProvider)
    -->
    <script>
      ;(function () {
        var isApp = /^\/app(\/|$)/.test(location.pathname)
        var key = isApp ? "vite-ui-theme" : "vite-ui-marketing-theme"
        var stored = localStorage.getItem(key)
        var theme =
          stored === "dark" || stored === "light" || stored === "system"
            ? stored
            : "system"
        var root = document.documentElement
        root.classList.remove("light", "dark")
        if (theme === "system") {
          if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            root.classList.add("dark")
          } else {
            root.classList.add("light")
          }
        } else {
          root.classList.add(theme)
        }
      })()
      ;(function () {
        if (!/^\/app(\/|$)/.test(location.pathname)) return
        var key = "vite-ui-density"
        var stored = localStorage.getItem(key)
        var density =
          stored === "compact" ||
          stored === "comfortable" ||
          stored === "spacious"
            ? stored
            : "comfortable"
        document.documentElement.setAttribute("data-density", density)
      })()
      ;(function () {
        if (!/^\/app(\/|$)/.test(location.pathname)) return
        var key = "vite-ui-motion-preference"
        var stored = localStorage.getItem(key)
        var motion =
          stored === "system" || stored === "reduce" || stored === "allow"
            ? stored
            : "system"
        document.documentElement.setAttribute("data-motion-preference", motion)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
