<!doctype html>
<html lang="en">
  <head>
    <!--
      RESPONSIBILITY ENVELOPE
      File role: Vite document entry.
      Owns: document shell, head metadata, favicon, viewport, root mount node.
      Must not own: app logic, route UI, design-system rules, feature scripts.
      Safe edits: title, meta tags, static document-level assets.
      Unsafe edits: app route markup (React owns routes).
      Architecture rule: keep this as the browser document boundary only.
      Related files: src/main.tsx, src/App.tsx.
      Theme script: `viteBase` is replaced at dev/build with Vite `config.base` (must match
      `import.meta.env.BASE_URL`). Path logic mirrors `src/app/_platform/theme/theme-inline-path.ts`.
    -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Default until React syncs from resolved theme (see ThemeColorMeta on each route branch). -->
    <meta name="theme-color" content="#0a0a0a" />
    <title>Afenda</title>
    <!--
      Blocking theme/density/motion: localStorage keys must match next-themes / shell prefs.
      App vs marketing: keys injected via `inject-vite-base-for-theme-script` in vite.config.ts.
      `routePath` strips Vite base so subpath deploys match React Router.
    -->
    <script>
      ;(function () {
        var viteBase = __VITE_RESOLVED_BASE_JSON__

        function pathAfterViteBase(pathname, base) {
          var raw = (base || "").trim()
          if (!raw || raw === "/") return pathname

          var prefix =
            raw.charAt(raw.length - 1) === "/" ? raw.slice(0, -1) : raw
          if (!prefix) return pathname
          if (pathname === prefix || pathname === prefix + "/") return "/"
          if (pathname.indexOf(prefix + "/") === 0)
            return pathname.slice(prefix.length)

          return pathname
        }

        function ensureThemeColorMeta() {
          var meta = document.querySelector('meta[name="theme-color"]')
          if (!meta) {
            meta = document.createElement("meta")
            meta.setAttribute("name", "theme-color")
            document.head.appendChild(meta)
          }
          return meta
        }

        var routePath = pathAfterViteBase(location.pathname, viteBase)
        var isApp = /^\/app(\/|$)/.test(routePath)

        var themeKey = isApp
          ? __AFENDA_APP_THEME_STORAGE_KEY_JSON__
          : __AFENDA_MARKETING_THEME_STORAGE_KEY_JSON__
        var storedTheme = localStorage.getItem(themeKey)
        var theme =
          storedTheme === "dark" ||
          storedTheme === "light" ||
          storedTheme === "system"
            ? storedTheme
            : "system"

        var root = document.documentElement
        root.classList.remove("light", "dark")

        var resolvedTheme = theme
        if (theme === "system") {
          resolvedTheme = window.matchMedia("(prefers-color-scheme: dark)")
            .matches
            ? "dark"
            : "light"
        }

        root.classList.add(resolvedTheme)
        ensureThemeColorMeta().setAttribute(
          "content",
          resolvedTheme === "dark" ? "#0a0a0a" : "#ffffff"
        )

        if (!isApp) return

        var dStored = localStorage.getItem(
          __AFENDA_UI_DENSITY_STORAGE_KEY_JSON__
        )
        var density =
          dStored === "compact" ||
          dStored === "comfortable" ||
          dStored === "spacious"
            ? dStored
            : "comfortable"
        root.setAttribute("data-density", density)

        var mStored = localStorage.getItem(
          __AFENDA_UI_MOTION_STORAGE_KEY_JSON__
        )
        var motion =
          mStored === "system" || mStored === "reduce" || mStored === "allow"
            ? mStored
            : "system"
        root.setAttribute("data-motion-preference", motion)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
