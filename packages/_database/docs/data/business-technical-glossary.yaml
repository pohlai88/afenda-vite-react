# Business ↔ technical glossary for @afenda/database
# Consumed by humans, docs, and optional repo scripts. Extend as schema grows.
#
# schema_version: bump when structure of this file changes (not for every new row).

schema_version: 2
document: business-technical-glossary
description: Maps Afenda business terms to PostgreSQL and Drizzle artifacts in packages/_database
package: "@afenda/database"

domain_modules:
  - id: tenancy
    label: Multi-tenant isolation
    summary: Data rows that belong to a customer organization are scoped by tenant key.
  - id: identity
    label: Authentication identity
    summary: Sign-in subjects, linked IdP identities, and auth-adjacent tokens.
  - id: authorization
    label: Roles and permissions
    summary: Membership, roles, permission keys, and scoped grants within a tenant.
  - id: organization
    label: Organization structure
    summary: Legal entities, org hierarchy, locations, and business units for modeling the company.
  - id: audit
    label: Audit evidence
    summary: Append-oriented evidence rows; see docs/AUDIT_ARCHITECTURE.md and packages/_database/src/audit/

entries:
  - id: tenant
    business_primary_term: Tenant
    aliases:
      - Organization
      - Customer organization
    domain_module: tenancy
    related_doc_anchor: GLOSSARY.md#2-tenant-and-organization
    technical:
      artifact_kind: table
      table: tenants
      drizzle_schema_file: packages/_database/src/tenancy/schema/tenants.schema.ts

  - id: tenant_membership
    business_primary_term: Tenant membership
    aliases:
      - Membership
      - User–tenant link
    domain_module: authorization
    technical:
      artifact_kind: table
      table: tenant_memberships
      drizzle_schema_file: packages/_database/src/tenancy/schema/tenant-memberships.schema.ts

  - id: tenant_settings
    business_primary_term: Tenant settings
    aliases:
      - Organization settings
    domain_module: tenancy
    technical:
      artifact_kind: table
      table: tenant_settings
      drizzle_schema_file: packages/_database/src/tenancy/schema/tenant-settings.schema.ts

  - id: tenant_status
    business_primary_term: Tenant lifecycle status
    aliases:
      - Organization status
    domain_module: tenancy
    technical:
      artifact_kind: postgres_enum
      enum_name: tenant_status
      drizzle_schema_file: packages/_database/src/tenancy/schema/tenant-status.schema.ts
    notes: |
      Values are defined in Drizzle as tenantStatus; there is no tenant_status table in this module.

  - id: user
    business_primary_term: User
    aliases:
      - End user account
    domain_module: identity
    related_doc_anchor: GLOSSARY.md#3-identity-user-vs-employee-or-party
