# https://turborepo.com/docs/guides/ci-vendors/github-actions
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate i18n corpora and audit
        run: pnpm run script:i18n-corpus-ingest && pnpm run script:i18n-crossref-audit

      - name: Check generated i18n artifacts are committed
        run: git diff --exit-code -- scripts/data/i18n-corpus-*.json apps/web/src/share/i18n/audit/conflicts.json apps/web/src/share/i18n/audit/provenance.json

      - name: Validate Afenda config
        run: pnpm run script:check-afenda-config

      - name: Validate i18n policy and conflicts
        run: pnpm run script:validate-i18n

      - name: Run shell governance report
        run: pnpm run script:check-shell-governance-report -- --format=json

      - name: Shell state policy (doctrine + narrow scan)
        run: pnpm run script:check-shell-state-policy

      - name: Upload shell governance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: shell-governance-report
          path: reports/shell-governance/*.json
          if-no-files-found: error

      - name: Format check
        run: pnpm run format:check

      - name: Lint, typecheck, test, build
        run: pnpm exec turbo run lint typecheck test:run build --summarize
