# https://turborepo.com/docs/guides/ci-vendors/github-actions
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Remote cache: set repo secret TURBO_TOKEN + variable TURBO_TEAM (see repo-root `.env.example`).
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Resolve Node version
        id: node_version
        run: echo "version=$(grep '^use-node-version=' .npmrc | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node_version.outputs.version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Governance registry integrity
        run: pnpm run script:check-governance-registry

      - name: Governance bindings validity
        run: pnpm run script:check-governance-bindings

      - name: Governance waivers validity
        run: pnpm run script:check-governance-waivers

      - name: Governance checks
        run: pnpm run script:run-governance-checks

      - name: Governance evidence completeness
        run: pnpm run script:generate-governance-report

      - name: Governance register sync
        run: pnpm run script:generate-governance-register

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: governance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Resolve Node version
        id: node_version
        run: echo "version=$(grep '^use-node-version=' .npmrc | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node_version.outputs.version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate apps/web root layout
        run: pnpm --filter @afenda/web run verify:layout

      - name: Regenerate i18n corpora and audit
        run: pnpm run script:generate-i18n-corpus && pnpm run script:generate-i18n-crossref-audit

      - name: Check generated i18n artifacts are committed
        run: git diff --exit-code -- apps/web/scripts/i18n/data/i18n-corpus-*.json apps/web/src/app/_platform/i18n/audit/conflicts.json apps/web/src/app/_platform/i18n/audit/provenance.json

      - name: Design system component governance check
        run: pnpm --filter @afenda/design-system run component-governance:check

      - name: Design system theme contract (validate-tokens)
        run: pnpm --filter @afenda/design-system run validate-tokens

      - name: Design system Tailwind token policy (check:tw)
        run: pnpm --filter @afenda/design-system run check:tw

      - name: Validate i18n policy and conflicts
        run: pnpm run script:validate-i18n-policy

      - name: Format check
        run: pnpm run format:check

      - name: Audit writer boundary (no direct audit_logs inserts)
        run: pnpm run script:check-audit-writer-boundary

      - name: Lint, typecheck, test, build
        run: pnpm exec turbo run lint typecheck test:run build --summarize

      - name: Features SDK package surface check
        run: pnpm --filter @afenda/features-sdk surface:check

      - name: Operator Kernel package surface check
        run: pnpm --filter @afenda/operator-kernel surface:check

      - name: Database package Drizzle guardrails
        run: pnpm -C packages/_database run db:ci

      - name: Shell metadata governance report
        run: pnpm --filter @afenda/web shell:validation-report

      - name: Design system coverage gate
        run: pnpm --filter @afenda/design-system test:coverage
