id: no-classname-string-map
language: TypeScript
severity: warning
message: "Variable named '*ClassMap', '*ToneMap', '*StyleMap', or '*SeverityMap' containing Tailwind class values detected outside the governed package. Semantic class mappings belong in @afenda/shadcn-ui."
note: "Move this to packages/shadcn-ui/src/semantic/domain/ and expose it via a getter function. See packages/shadcn-ui/RULES.md."
files:
  - "apps/**/*.{ts,tsx}"
rule:
  kind: variable_declarator
  all:
    - has:
        kind: identifier
        regex: "(ClassMap|ToneMap|StyleMap|SeverityMap)$"
    - has:
        kind: object
        has:
          kind: pair
          has:
            kind: string
            regex: "(bg|text|border|ring|fill|stroke|rounded|shadow)-"
